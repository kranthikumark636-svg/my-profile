<!DOCTYPE html>
<html>
<head>
    <title>KRANTHI's Website</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>🚀 KRANTHI's Website</h1>
    <p>AI Student Helper for College</p>
</header>

<div class="container">

    <!-- Chatbot -->
    <div class="card">
        <h2>🤖 AI Chatbot</h2>
        <input type="text" id="userInput" placeholder="Ask something...">
        <button onclick="chat()">Send</button>
        <p id="chatOutput"></p>
    </div>

    <!-- CGPA Calculator -->
    <div class="card">
        <h2>📊 CGPA Calculator</h2>
        <input type="number" id="s1" placeholder="Sem 1 GPA">
        <input type="number" id="s2" placeholder="Sem 2 GPA">
        <button onclick="calculate()">Calculate</button>
        <p id="result"></p>
    </div>

</div>

<footer>
    <p>Made by Kranthi 💻</p>
</footer>

<script src="script.js"></script>
</body>
</html>
